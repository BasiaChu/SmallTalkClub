{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    
    <h1 style="font-family: 'Quicksand', sans-serif; font-size: 3rem; color: var(--brand-blue); margin-bottom: 20px;">
        Angielski bez stresu ✨
    </h1>
    
    <p style="font-size: 1.2rem; color: #555; max-width: 600px; margin: 0 auto 40px auto;">
        Witaj w Small Talk Club! Rozgość się, zrób sobie kawę i ćwicz język we własnym tempie. 
        Bez ocen, bez presji – po prostu dla siebie.
    </p>

    <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
        <a href="{% url 'exercises' %}" class="btn-login" style="font-size: 1.1rem; padding: 12px 30px !important;">
            Zacznij ćwiczyć 🚀
        </a>
        
        <a href="{% url 'private_lessons' %}" style="border: 2px solid var(--brand-blue); color: var(--brand-blue); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; transition: 0.3s;">
            Poznaj mnie 👩‍🏫
        </a>
    </div>
</div>
{% endblock %}
