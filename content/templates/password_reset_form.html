{% extends 'base.html' %}
{% block content %}
<div class="auth-box">
  <h2>Zapomniałaś hasła? 🗝️</h2>
  <p>Podaj swój e-mail, a wyślemy Ci instrukcję resetowania.</p>
  <form method="POST" class="auth-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Wyślij link resetujący</button>
  </form>
</div>
{% endblock %}
